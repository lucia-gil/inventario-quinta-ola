<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del Servidor | 500</title>
    <link href="/src/style.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center text-center p-6 font-sans">

    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">

        <div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="server-crash" class="w-10 h-10 text-warning"></i>
        </div>

        <h1 class="text-7xl font-black text-gray-100 mb-2">500</h1>
        <h2 class="text-xl font-bold text-secondary mb-3">Error interno del servidor</h2>
        <p class="text-gray-500 text-sm leading-relaxed mb-8">
            Algo salió mal de nuestro lado. No es un problema tuyo —
            nuestro equipo ya fue notificado. Intenta de nuevo en unos minutos.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 w-full">
            <a href="index.html"
               class="btn-page-primary flex-1 justify-center">
                <i data-lucide="home" class="w-4 h-4"></i>
                Ir al inicio
            </a>
            <button onclick="window.location.reload()"
               class="btn-ghost flex-1 justify-center">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                Reintentar
            </button>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
