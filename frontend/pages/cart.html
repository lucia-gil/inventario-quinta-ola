<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito - Quinta Ola</title>
    <link href="/src/style.css" rel="stylesheet" /> 
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-background text-textMain font-sans scroll-smooth flex flex-col min-h-screen">

    <main class="flex-grow pt-28 pb-16 px-6 max-w-4xl mx-auto w-full">
        
        <div class="mb-10 border-b border-gray-200 pb-6 flex justify-between items-end">
            <div>
                <h1 class="page-title text-secondary flex items-center gap-3">
                    Tu Solicitud
                </h1>
                <p class="page-subtitle mt-2">Revisa los materiales antes de confirmar tu pedido.</p>
            </div>
            <span class="bg-purple-100 text-purple-700 py-1 px-4 rounded-full text-sm font-bold">
                0 Artículos
            </span>
        </div>

        <div class="panel p-16 flex flex-col items-center justify-center text-center">
            
            <div class="w-24 h-24 bg-purple-50 rounded-full flex items-center justify-center mb-6 relative">
                <i data-lucide="shopping-cart" class="w-12 h-12 text-purple-400"></i>
                <div class="absolute top-0 right-0 bg-gray-200 w-6 h-6 rounded-full border-4 border-white flex items-center justify-center">
                    <i data-lucide="x" class="w-3 h-3 text-gray-500"></i>
                </div>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Tu carrito está vacío</h2>
            <p class="text-gray-500 max-w-md mb-8">Aún no has agregado ningún material a tu solicitud. Vuelve al catálogo para explorar las opciones disponibles.</p>
            
            <a href="/pages/catalog.html" class="btn-page-primary w-auto">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Volver al catálogo
            </a>
        </div>

    </main>

    <script src="/src/ui.js"></script>
    <script>
        // Usamos las funciones "Public" porque esta es una vista de catálogo, no de admin
        QO.navbarPublic({ active: 'cart' });
        QO.footerPublic();
        
        // Inicializar los iconos
        QO.init();
    </script>
</body>
</html>
