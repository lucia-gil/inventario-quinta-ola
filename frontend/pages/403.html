<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado | 403</title>
    <link href="/src/style.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center text-center p-6 font-sans">

    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">

        <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="shield-off" class="w-10 h-10 text-danger"></i>
        </div>

        <h1 class="text-7xl font-black text-gray-100 mb-2">403</h1>
        <h2 class="text-xl font-bold text-secondary mb-3">Acceso denegado</h2>
        <p class="text-gray-500 text-sm leading-relaxed mb-8">
            No tienes permisos para ver esta página. Si crees que es un error,
            contacta al administrador del sistema.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 w-full">
            <a href="index.home.html"
               class="btn-page-primary flex-1 justify-center">
                <i data-lucide="home" class="w-4 h-4"></i>
                Ir al inicio
            </a>
            <button onclick="window.history.back()"
               class="btn-ghost flex-1 justify-center">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Volver
            </button>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
