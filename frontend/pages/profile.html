<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil | Quinta Ola</title>
  <link href="/src/style.css" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="page-body">

  <main class="page-main-narrow">

    <div class="flex flex-col md:flex-row gap-8">

      <!-- COLUMNA IZQUIERDA: AVATAR + ESTADO -->
      <div class="md:w-1/3 space-y-6">

        <div class="panel-form text-center relative">
          <div class="relative w-32 h-32 mx-auto mb-4">
            <div class="profile-avatar overflow-hidden">
              <span id="userInitials">AG</span>
            </div>
            <label for="avatar-upload"
              class="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow-lg border border-gray-100 cursor-pointer hover:text-accent transition-colors">
              <i data-lucide="camera" class="w-5 h-5"></i>
              <input type="file" id="avatar-upload" class="hidden" accept="image/*" />
            </label>
          </div>

          <h2 class="profile-name">Alvaro Gómez</h2>
          <p class="text-gray-500 text-sm mb-6">alvaro@email.com</p>

          <div class="pt-6 border-t border-gray-100">
            <a href="/pages/show-login.html" class="btn-logout">
              <i data-lucide="log-out" class="w-4 h-4"></i> Cerrar Sesión
            </a>
          </div>
        </div>

        <div class="panel-form">
          <h3 class="form-label-tiny mb-4">Estado del Perfil</h3>
          <div class="flex items-center gap-3">
            <div class="h-2.5 w-2.5 rounded-full bg-green-500"></div>
            <span class="text-sm font-medium text-gray-700">Cuenta Activa</span>
          </div>
        </div>

      </div>

      <!-- COLUMNA DERECHA: INFO + SEGURIDAD -->
      <div class="md:w-2/3 space-y-6">

        <div class="panel">
          <div class="panel-header">
            <h3 class="font-bold text-gray-900 flex items-center gap-2">
              <i data-lucide="user-cog" class="w-5 h-5 text-accent"></i>
              Información Personal
            </h3>
            <span class="role-manager">Manager</span>
          </div>
          <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
              <div class="space-y-1">
                <label class="form-label-tiny">Nombre</label>
                <p class="text-sm font-semibold text-gray-800 border-b border-gray-50 pb-2">Alvaro</p>
              </div>
              <div class="space-y-1">
                <label class="form-label-tiny">Apellido</label>
                <p class="text-sm font-semibold text-gray-800 border-b border-gray-50 pb-2">Gómez</p>
              </div>
              <div class="md:col-span-2 space-y-1">
                <label class="form-label-tiny">Correo Electrónico</label>
                <p class="text-sm font-semibold text-gray-800 border-b border-gray-50 pb-2">alvaro@email.com</p>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h3 class="font-bold text-gray-900 flex items-center gap-2">
              <i data-lucide="lock" class="w-5 h-5 text-accent"></i>
              Seguridad
            </h3>
          </div>
          <form class="p-8 space-y-5">
            <div>
              <label class="form-label-tiny">Contraseña actual</label>
              <input type="password" placeholder="••••••••" class="input-page mt-1" />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="form-label-tiny">Nueva contraseña</label>
                <input type="password" placeholder="Mín. 8 caracteres" class="input-page mt-1" />
              </div>
              <div>
                <label class="form-label-tiny">Confirmar nueva contraseña</label>
                <input type="password" placeholder="Repite la contraseña" class="input-page mt-1" />
              </div>
            </div>
            <button type="submit" class="btn-submit mt-2">Actualizar Contraseña</button>
          </form>
        </div>

      </div>
    </div>
  </main>

  <footer class="bg-gray-950 text-gray-500 py-8 mt-auto border-t border-gray-800">
    <div class="max-w-4xl mx-auto px-6 text-center text-[10px] uppercase tracking-widest">
      © 2026 Quinta Ola • Sistema de Gestión
    </div>
  </footer>

  <script src="/src/ui.js"></script>
  <script>
    const userName = localStorage.getItem('userName') || 'Usuario';
    const userRole = localStorage.getItem('userRole') || '';
    QO.navbar({ active: '', name: userName, role: userRole });
    lucide.createIcons();

    document.getElementById('avatar-upload').addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const el = document.querySelector('.profile-avatar');
          el.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    });
  </script>
</body>
</html>
